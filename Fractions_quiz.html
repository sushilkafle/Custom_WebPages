<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fractions & More</title>
  <link rel="stylesheet" href="quiz-styles.css" />
  <style>
    body { --theme-from: #66bb6a; --theme-to: #388e3c; --theme-accent: #2e7d32; --theme-accent-dark: #1b5e20; }
  </style>
</head>
<body>
  <div id="quiz-root"></div>
  <script src="quiz-core.js"></script>
  <script>
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    // Ensure unique choices — pads with extras if dupes drop the count below 4
    function uniqueChoices(correct, wrongs, extras = () => String(rand(1, 99))) {
      const seen = new Set([String(correct)]);
      const out = [String(correct)];
      for (const w of wrongs) {
        const s = String(w);
        if (!seen.has(s)) { seen.add(s); out.push(s); }
      }
      let guard = 0;
      while (out.length < 4 && guard++ < 20) {
        const s = String(extras());
        if (!seen.has(s)) { seen.add(s); out.push(s); }
      }
      return shuffle(out);
    }

    // --- 3rd-grade "more than arithmetic" problems ---

    function fractionCompare() {
      // Two fractions with same denominator — which is bigger? (multiple choice)
      const den = pick([2, 3, 4, 5, 6, 8]);
      const a = rand(1, den - 1);
      let b = rand(1, den - 1);
      while (b === a) b = rand(1, den - 1);
      const fa = `${a}/${den}`, fb = `${b}/${den}`;
      const answer = a > b ? fa : fb;
      return {
        prompt: `Which fraction is bigger?<br><span style="font-size:0.9em">${fa} &nbsp; or &nbsp; ${fb}</span>`,
        answer,
        choices: shuffle([fa, fb])
      };
    }

    function fractionOfShape() {
      // "A pizza is cut into 8 slices. 3 are eaten. What fraction is LEFT?"
      const total = pick([4, 5, 6, 8, 10]);
      // Avoid eaten === total - eaten (would make duplicate choices)
      let eaten;
      do { eaten = rand(1, total - 1); } while (eaten === total - eaten);
      const correct = `${total - eaten}/${total}`;
      return {
        prompt: `A pizza is cut into ${total} slices. ${eaten} are eaten. What fraction is LEFT?`,
        answer: correct,
        choices: uniqueChoices(
          correct,
          [`${eaten}/${total}`, `${total}/${total - eaten}`, `${total - eaten}/${eaten}`],
          () => `${rand(1, total - 1)}/${total}`
        )
      };
    }

    function rounding() {
      // Round to nearest 10 or 100
      const toHundred = Math.random() < 0.5;
      const n = toHundred ? rand(100, 999) : rand(10, 199);
      const base = toHundred ? 100 : 10;
      const ans = Math.round(n / base) * base;
      return { prompt: `Round ${n} to the nearest ${base}.`, answer: ans };
    }

    function placeValue() {
      // "What is the value of the digit X in NNN?"
      // Pick a number whose digits are all non-zero to avoid ambiguity and duplicate choices.
      let n, str;
      do {
        n = rand(111, 9999);
        str = String(n);
      } while (str.includes("0"));
      const idx = rand(0, str.length - 1);
      const digit = Number(str[idx]);
      const place = Math.pow(10, str.length - 1 - idx);
      const correct = digit * place;
      return {
        prompt: `What is the VALUE of the digit <b>${digit}</b> in <b>${n}</b>?`,
        answer: correct,
        choices: uniqueChoices(
          correct,
          [digit, digit * place * 10, digit * Math.max(1, place / 10)],
          () => digit * Math.pow(10, rand(0, str.length - 1))
        )
      };
    }

    function timeElapsed() {
      const hr = rand(1, 11), mn = pick([0, 15, 30, 45]);
      const addMin = pick([15, 30, 45, 60, 90]);
      const totalMin = hr * 60 + mn + addMin;
      const endHr = Math.floor(totalMin / 60) % 12 || 12;
      const endMn = totalMin % 60;
      const fmt = (h, m) => `${h}:${String(m).padStart(2, "0")}`;
      const correct = fmt(endHr, endMn);
      const makeWrong = () => {
        const dh = rand(-1, 2), dm = pick([-15, 15, 30, 45]);
        return fmt(((endHr + dh - 1 + 12) % 12) + 1, (endMn + dm + 60) % 60);
      };
      return {
        prompt: `It is ${fmt(hr, mn)}. What time will it be in ${addMin} minutes?`,
        answer: correct,
        choices: uniqueChoices(correct, [makeWrong(), makeWrong(), makeWrong()], makeWrong)
      };
    }

    function money() {
      // "You have $X. You buy something for $Y.YY. How much change?"
      const have = pick([5, 10, 20]);
      const cost = rand(100, have * 100 - 1) / 100;
      const change = Math.round((have - cost) * 100) / 100;
      return {
        prompt: `You have $${have}.00. You buy something for $${cost.toFixed(2)}. How much change do you get? (in cents)`,
        answer: Math.round(change * 100)
      };
    }

    function evenOdd() {
      const n = rand(10, 200);
      return {
        prompt: `Is <b>${n}</b> even or odd?`,
        answer: n % 2 === 0 ? "Even" : "Odd",
        choices: ["Even", "Odd"]
      };
    }

    function missingNumber() {
      // a + ? = b  or  ? × a = b
      if (Math.random() < 0.5) {
        const a = rand(5, 50), sum = a + rand(5, 50);
        return { prompt: `${a} + ? = ${sum}`, answer: sum - a };
      } else {
        const a = rand(2, 10), q = rand(2, 10);
        return { prompt: `? × ${a} = ${a * q}`, answer: q };
      }
    }

    const GENERATORS = [
      fractionCompare, fractionOfShape, rounding, placeValue,
      timeElapsed, money, evenOdd, missingNumber
    ];

    QuizCore.start({
      title: "Fractions & More",
      emoji: "🍕",
      storageKey: "frac_best",
      subtitle: "Fractions, rounding, place value, time, money — real 3rd grade stuff!",
      difficulties: [
        { label: "Explore all topics", value: "all" }
      ],
      makeQuestion() {
        return pick(GENERATORS)();
      }
    });
  </script>
</body>
</html>
